---
version: 3

options:
  package_manager_path: /usr/bin/microdnf

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-26/ee-minimal-rhel9:latest

build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: "--ignore-certs"

dependencies:
  galaxy:
    collections:
      - name: infoblox.universal_ddi
      - name: infoblox.nios_modules
      - name: community.general
  python:
    - bloxone
    - requests
    - jmespath
    - packaging
    - requests >= 2.32.0
    - universal-ddi-python-client >= 0.1.0

  system:
    - python3-pip [platform:rpm]
    - python3-devel [platform:rpm]
    - gcc [platform:rpm]
    - python3 >=3.10 [platform:rpm]
  ansible_core:
    package_pip: ansible-core>=2.16.0
