---
# Verify provisioned DDI workloads (DNS records, DHCP reservations)

- name: Verify Infoblox DDI Workloads
  hosts: infoblox_portal

  module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url | default(omit) }}"
      api_key: "{{ api_key | default(omit) }}"

  roles:
    - workload_verify
