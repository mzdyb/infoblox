---
name: Deploy DDI Configuration

on:
  push:
    branches: [main]
    paths:
      - 'inventory/host_vars/**'

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      infrastructure: ${{ steps.filter.outputs.infrastructure }}
      workload: ${{ steps.filter.outputs.workload }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infrastructure:
              - 'inventory/host_vars/**/ip_spaces.yml'
              - 'inventory/host_vars/**/dns_views.yml'
              - 'inventory/host_vars/**/subnets.yml'
              - 'inventory/host_vars/**/zones.yml'
            workload:
              - 'inventory/host_vars/**/hosts.yml'

  deploy-infrastructure:
    name: Deploy Infrastructure
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.infrastructure == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AAP Infrastructure Workflow
        uses: distributhor/workflow-webhook@v3
        with:
          webhook_url: ${{ secrets.WEBHOOK_URL_INFRA }}
          webhook_secret: ${{ secrets.WEBHOOK_SECRET_INFRA }}
          verify_ssl: false

  deploy-workload:
    name: Deploy Workload
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.workload == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AAP Workload Workflow
        uses: distributhor/workflow-webhook@v3
        with:
          webhook_url: ${{ secrets.WEBHOOK_URL_WORKLOAD }}
          webhook_secret: ${{ secrets.WEBHOOK_SECRET_WORKLOAD }}
          verify_ssl: false
