---
ansible-navigator:
  ansible:
    config:
      path: ansible.cfg
  execution-environment:
    image: aap.rh.lab/ee-infoblox:2.0
    pull:
      policy: missing
    environment-variables:
      pass:
        - INFOBLOX_PORTAL_KEY
        - INFOBLOX_PORTAL_URL
  playbook-artifact:
    enable: false
  mode: stdout
