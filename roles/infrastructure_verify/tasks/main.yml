---
# IP Spaces
- name: Get IP Spaces
  infoblox.universal_ddi.ipam_ip_space_info: {}
  register: ip_spaces
  when: "'ip_spaces' in verify_scope"

- name: Show IP Spaces information
  ansible.builtin.debug:
    msg: "{{ space.name }}"
  loop: "{{ ip_spaces.objects }}"
  loop_control:
    loop_var: space
    label: "{{ space.name }}"
  when: "'ip_spaces' in verify_scope"

- name: Build IP space name lookup
  ansible.builtin.set_fact:
    ip_space_names: "{{ ip_spaces.objects | items2dict(key_name='id', value_name='name') }}"
  when: "'ip_spaces' in verify_scope"

# DNS Views
- name: Get DNS Views
  infoblox.universal_ddi.dns_view_info: {}
  register: dns_views
  when: "'dns_views' in verify_scope"

- name: Show DNS Views information
  ansible.builtin.debug:
    msg: "{{ view.name }}"
  loop: "{{ dns_views.objects }}"
  loop_control:
    loop_var: view
    label: "{{ view.name }}"
  when: "'dns_views' in verify_scope"

- name: Build DNS view name lookup
  ansible.builtin.set_fact:
    dns_view_names: "{{ dns_views.objects | items2dict(key_name='id', value_name='name') }}"
  when: "'dns_views' in verify_scope"

# Subnets
- name: Get Subnets
  infoblox.universal_ddi.ipam_subnet_info: {}
  register: subnets
  when: "'subnets' in verify_scope"

- name: Show Subnets information
  ansible.builtin.debug:
    msg: "{{ subnet.address }} (space: {{ ip_space_names[subnet.space] | default(subnet.space) }})"
  loop: "{{ subnets.objects }}"
  loop_control:
    loop_var: subnet
    label: "{{ subnet.address }}"
  when: "'subnets' in verify_scope"

# DNS Auth Zones
- name: Get DNS Auth Zones
  infoblox.universal_ddi.dns_auth_zone_info: {}
  register: zones
  when: "'zones' in verify_scope"

- name: Show DNS Auth Zones information
  ansible.builtin.debug:
    msg: "{{ zone.fqdn }} (view: {{ dns_view_names[zone.view] | default(zone.view | default('N/A')) }})"
  loop: "{{ zones.objects }}"
  loop_control:
    loop_var: zone
    label: "{{ zone.fqdn }}"
  when: "'zones' in verify_scope"
