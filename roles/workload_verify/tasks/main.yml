---
# DNS Records
- name: Get DNS Records
  infoblox.universal_ddi.dns_record_info: {}
  register: dns_records
  when: "'dns_records' in verify_scope"

- name: Show DNS Records
  ansible.builtin.debug:
    msg: "{{ record.absolute_name_spec }} -> {{ record.rdata.address | default('N/A') }} (type: {{ record.type }})"
  loop: "{{ dns_records.objects }}"
  loop_control:
    loop_var: record
    label: "{{ record.absolute_name_spec }}"
  when: "'dns_records' in verify_scope"

# DHCP Reservations
- name: Get DHCP Reservations
  infoblox.universal_ddi.dhcp_fixed_address_info: {}
  register: dhcp_reservations
  when: "'dhcp_reservations' in verify_scope"

- name: Show DHCP Reservations
  ansible.builtin.debug:
    msg: "{{ reservation.address }} (mac: {{ reservation.match_value }}, space: {{ reservation.ip_space }})"
  loop: "{{ dhcp_reservations.objects }}"
  loop_control:
    loop_var: reservation
    label: "{{ reservation.address }}"
  when: "'dhcp_reservations' in verify_scope"
