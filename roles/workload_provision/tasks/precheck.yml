---
# Extract zone name and record name from FQDN
- name: Set zone and record name facts
  ansible.builtin.set_fact:
    record_name: "{{ current_host.fqdn.split('.')[0] }}"
    zone_fqdn: "{{ current_host.fqdn.split('.')[1:] | join('.') }}."

# Look up the DNS zone
- name: Look up DNS zone for {{ zone_fqdn }}
  infoblox.universal_ddi.dns_auth_zone_info:
    filters:
      fqdn: "{{ zone_fqdn }}"
  register: zone_lookup

- name: Set zone ID
  ansible.builtin.set_fact:
    zone_id: "{{ zone_lookup.objects[0].id | default('') }}"

# Look up the IP space for the subnet
- name: Set IP space name from subnet definition
  ansible.builtin.set_fact:
    ip_space_name: "{{ (subnets | selectattr('cidr', 'eq', current_host.network_cidr) | first).ip_space }}"

- name: Look up IP space {{ ip_space_name }}
  infoblox.universal_ddi.ipam_ip_space_info:
    filters:
      name: "{{ ip_space_name }}"
  register: ip_space_lookup

- name: Set IP space ID
  ansible.builtin.set_fact:
    ip_space_id: "{{ ip_space_lookup.objects[0].id | default('') }}"

# Look up the subnet (only needed for provisioning)
- name: Look up subnet {{ current_host.network_cidr }}
  infoblox.universal_ddi.ipam_subnet_info:
    filters:
      address: "{{ current_host.network_cidr.split('/')[0] }}"
      cidr: "{{ current_host.network_cidr.split('/')[1] }}"
      space: "{{ ip_space_id }}"
  register: subnet_lookup
  when: current_host.state == 'present'

- name: Set subnet ID
  ansible.builtin.set_fact:
    subnet_id: "{{ subnet_lookup.objects[0].id }}"
  when: current_host.state == 'present'

# Check if host DNS record already exists
- name: Check for existing DNS record for {{ current_host.fqdn }}
  infoblox.universal_ddi.dns_record_info:
    filters:
      absolute_name_spec: "{{ current_host.fqdn }}."
      zone: "{{ zone_id }}"
  register: existing_record
  ignore_errors: true
  when: zone_id != ''

- name: Set host existence flag
  ansible.builtin.set_fact:
    host_exists: "{{ (existing_record.objects | default([]) | length > 0) if zone_id != '' else false }}"

- name: Set existing host facts
  ansible.builtin.set_fact:
    existing_ip: "{{ existing_record.objects[0].rdata.address }}"
    existing_record_id: "{{ existing_record.objects[0].id }}"
  when: host_exists
